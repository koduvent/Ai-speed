<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<title>Speed Detector</title>

<!-- Home-screen / PWA install hints (iOS) -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Speed" />
<meta name="theme-color" content="#0b0e13" />
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230b0e13'/%3E%3Ctext x='50' y='66' font-size='52' text-anchor='middle' fill='%2300e08a' font-family='sans-serif'%3E%E2%9A%A1%3C/text%3E%3C/svg%3E" />

<!-- On-device inference -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>

<style>
  :root{
    --bg:#0b0e13; --panel:#151a22; --line:#252c38;
    --txt:#e7ecf3; --dim:#8a94a6; --accent:#00e08a; --danger:#ff4d57;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--txt);
    font-family:-apple-system,system-ui,sans-serif;overscroll-behavior:none}
  #stage{position:fixed;inset:0;overflow:hidden}
  video,canvas{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    max-width:100%;max-height:100%}
  video{object-fit:contain}
  #overlay{pointer-events:none}
  #tapLayer{position:absolute;inset:0;display:none}      /* receives calib taps */

  /* top status bar */
  #hud{position:absolute;top:0;left:0;right:0;padding:max(12px,env(safe-area-inset-top)) 14px 12px;
    display:flex;gap:10px;align-items:center;justify-content:space-between;
    background:linear-gradient(#000a,transparent);font-size:13px;font-variant-numeric:tabular-nums}
  .pill{background:#0009;border:1px solid var(--line);border-radius:999px;
    padding:5px 11px;display:flex;gap:6px;align-items:center}
  .pill b{color:var(--accent)}
  #limitPill b{color:var(--danger)}

  /* bottom controls */
  #bar{position:absolute;left:0;right:0;bottom:0;
    padding:14px 14px max(16px,env(safe-area-inset-bottom));
    background:linear-gradient(transparent,#000c 40%);
    display:flex;gap:10px;align-items:center;justify-content:center;flex-wrap:wrap}
  button{appearance:none;border:1px solid var(--line);background:var(--panel);
    color:var(--txt);font-size:15px;font-weight:600;padding:12px 18px;border-radius:14px;
    min-height:48px;flex:1 1 auto;max-width:230px}
  button:active{transform:scale(.97)}
  button.primary{background:var(--accent);color:#06231a;border-color:transparent}
  button:disabled{opacity:.45}
  #limitInput{width:74px;text-align:center;background:var(--panel);color:var(--txt);
    border:1px solid var(--line);border-radius:14px;min-height:48px;font-size:15px;font-weight:600}

  /* calibration banner */
  #calibMsg{position:absolute;top:64px;left:14px;right:14px;display:none;
    background:#000c;border:1px solid var(--accent);border-radius:14px;padding:12px 14px;
    font-size:14px;line-height:1.4;text-align:center}
  #calibMsg b{color:var(--accent)}

  /* first-run splash */
  #splash{position:absolute;inset:0;display:flex;flex-direction:column;gap:18px;
    align-items:center;justify-content:center;text-align:center;padding:28px;background:var(--bg)}
  #splash h1{font-size:22px;margin:0}
  #splash p{color:var(--dim);font-size:14px;line-height:1.5;margin:0;max-width:320px}
  #status{color:var(--dim);font-size:13px;min-height:18px}
  .spinner{width:30px;height:30px;border:3px solid var(--line);border-top-color:var(--accent);
    border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="stage">
  <video id="video" playsinline autoplay muted></video>
  <canvas id="overlay"></canvas>
  <canvas id="tapLayer"></canvas>

  <div id="hud">
    <span class="pill"><span id="fps">0</span> fps</span>
    <span class="pill">🚗 <b id="count">0</b></span>
    <span class="pill" id="limitPill" style="display:none">limit <b id="limitShown">–</b></span>
  </div>

  <div id="calibMsg"></div>

  <div id="bar">
    <button id="calibBtn">Calibrate</button>
    <input id="limitInput" type="number" inputmode="numeric" placeholder="limit" />
  </div>

  <div id="splash">
    <div class="spinner"></div>
    <h1>⚡ Speed Detector</h1>
    <p>Runs entirely on your iPhone. Mount it steady, point at the road, then calibrate against a known distance.</p>
    <div id="status">Loading model…</div>
    <button id="startBtn" class="primary" style="max-width:240px" disabled>Start camera</button>
  </div>
</div>

<script>
"use strict";
// ---------------------------------------------------------------------------
// Geometry + speed engine  (validated to match the Python version exactly)
// ---------------------------------------------------------------------------
function solve8(A,b){
  const n=b.length, M=A.map((r,i)=>[...r,b[i]]);
  for(let c=0;c<n;c++){
    let p=c; for(let r=c+1;r<n;r++) if(Math.abs(M[r][c])>Math.abs(M[p][c])) p=r;
    [M[c],M[p]]=[M[p],M[c]];
    const d=M[c][c]; for(let k=c;k<=n;k++) M[c][k]/=d;
    for(let r=0;r<n;r++){ if(r===c) continue; const f=M[r][c];
      for(let k=c;k<=n;k++) M[r][k]-=f*M[c][k]; }
  }
  return M.map(r=>r[n]);
}
function getPerspectiveTransform(src,dst){
  const A=[],b=[];
  for(let i=0;i<4;i++){ const [x,y]=src[i],[u,v]=dst[i];
    A.push([x,y,1,0,0,0,-u*x,-u*y]); b.push(u);
    A.push([0,0,0,x,y,1,-v*x,-v*y]); b.push(v); }
  const h=solve8(A,b);
  return [[h[0],h[1],h[2]],[h[3],h[4],h[5]],[h[6],h[7],1]];
}
function applyH(H,x,y){
  const d=H[2][0]*x+H[2][1]*y+H[2][2];
  return [(H[0][0]*x+H[0][1]*y+H[0][2])/d,(H[1][0]*x+H[1][1]*y+H[1][2])/d];
}
function speedKmh(hist){
  if(hist.length<2) return null;
  const a=hist[0], z=hist[hist.length-1];
  const dist=Math.hypot(z.x-a.x,z.y-a.y), dt=(z.t-a.t)/1000;
  if(dt<=0) return null;
  return dist/dt*3.6;
}

// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
const VEHICLES = new Set(["car","truck","bus","motorcycle"]);
const video=document.getElementById("video");
const overlay=document.getElementById("overlay"), octx=overlay.getContext("2d");
const tapLayer=document.getElementById("tapLayer"), tctx=tapLayer.getContext("2d");
let model=null, running=false, calibrating=false;
let H=null, calibPts=[], srcPoly=null;      // homography + zone polygon (video px)
let limit=null;
let tracks=[], nextId=1;
let lastFpsT=performance.now(), frames=0;

// remember calibration between sessions (this file is self-hosted, so OK)
function saveCalib(o){ try{ localStorage.setItem("speedCalib",JSON.stringify(o)); }catch(e){} }
function loadCalib(){ try{ return JSON.parse(localStorage.getItem("speedCalib")); }catch(e){ return null; } }

// ---------------------------------------------------------------------------
// Boot: load model, then camera
// ---------------------------------------------------------------------------
const statusEl=document.getElementById("status"), startBtn=document.getElementById("startBtn");
(async()=>{
  try{
    await tf.ready();
    model=await cocoSsd.load({base:"lite_mobilenet_v2"});
    statusEl.textContent="Model ready.";
    startBtn.disabled=false;
  }catch(e){ statusEl.textContent="Model failed to load — check your connection."; }
})();

startBtn.onclick=async()=>{
  startBtn.disabled=true; statusEl.textContent="Requesting camera…";
  try{
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:"environment"},width:{ideal:1280},height:{ideal:720}},
      audio:false});
    video.srcObject=stream;
    await video.play();
    await new Promise(r=>{ if(video.videoWidth) r(); else video.onloadedmetadata=r; });
    sizeCanvases();
    const c=loadCalib(); if(c){ calibPts=c.pts; buildHomography(c.pts,c.w,c.l); }
    document.getElementById("splash").style.display="none";
    running=true; detectLoop(); drawLoop();
  }catch(e){
    statusEl.textContent="Camera blocked. Allow camera access and reload (must be HTTPS).";
    startBtn.disabled=false;
  }
};

function sizeCanvases(){
  for(const cv of [overlay,tapLayer]){ cv.width=video.videoWidth; cv.height=video.videoHeight; }
  // match the <video> letterboxed display rect so overlays line up
  const place=()=>{
    const r=video.getBoundingClientRect();
    for(const cv of [overlay,tapLayer]){
      cv.style.width=r.width+"px"; cv.style.height=r.height+"px";
      cv.style.top="50%"; cv.style.left="50%"; cv.style.transform="translate(-50%,-50%)";
    }
  };
  place(); window.addEventListener("resize",place);
}

// ---------------------------------------------------------------------------
// Detection loop (gated so we never queue faster than the model runs)
// ---------------------------------------------------------------------------
async function detectLoop(){
  while(running){
    if(calibrating){ await new Promise(r=>setTimeout(r,120)); continue; }
    let preds=[];
    try{ preds=await model.detect(video,20,0.4); }catch(e){}
    update(preds.filter(p=>VEHICLES.has(p.class)));
    frames++;
    const now=performance.now();
    if(now-lastFpsT>500){
      document.getElementById("fps").textContent=Math.round(frames*1000/(now-lastFpsT));
      frames=0; lastFpsT=now;
    }
  }
}

function iou(a,b){
  const ax2=a[0]+a[2],ay2=a[1]+a[3],bx2=b[0]+b[2],by2=b[1]+b[3];
  const ix=Math.max(0,Math.min(ax2,bx2)-Math.max(a[0],b[0]));
  const iy=Math.max(0,Math.min(ay2,by2)-Math.max(a[1],b[1]));
  const inter=ix*iy, uni=a[2]*a[3]+b[2]*b[3]-inter;
  return uni>0?inter/uni:0;
}

function update(dets){
  const now=performance.now();
  const used=new Set();
  // greedy IoU match: each detection to its best free track
  for(const d of dets){
    let best=-1,bi=-1;
    tracks.forEach((t,i)=>{ if(used.has(i))return; const v=iou(d.bbox,t.box);
      if(v>best){best=v;bi=i;} });
    if(best>0.3){
      const t=tracks[bi]; used.add(bi);
      t.box=d.bbox; t.cls=d.class; t.missed=0;
      pushWorld(t,d.bbox,now);
    }else{
      const t={id:nextId++,box:d.bbox,cls:d.class,missed:0,hist:[],speed:null};
      pushWorld(t,d.bbox,now); tracks.push(t);
    }
  }
  // age out tracks not matched this round
  tracks.forEach((t,i)=>{ if(!used.has(i)&&dets.length) t.missed++; });
  tracks=tracks.filter(t=>t.missed<8);
  document.getElementById("count").textContent=tracks.length;
}

function pushWorld(t,box,now){
  if(!H) return;
  const ax=box[0]+box[2]/2, ay=box[1]+box[3];   // bottom-centre = ground contact
  const [wx,wy]=applyH(H,ax,ay);
  t.hist.push({x:wx,y:wy,t:now});
  while(t.hist.length && now-t.hist[0].t>1000) t.hist.shift();
  if(t.hist.length>=2 && now-t.hist[0].t>500){
    const s=speedKmh(t.hist);
    if(s!==null) t.speed=t.speed==null?s:t.speed*0.6+s*0.4;  // light smoothing
  }
}

// ---------------------------------------------------------------------------
// Draw loop
// ---------------------------------------------------------------------------
function drawLoop(){
  if(!running) return;
  octx.clearRect(0,0,overlay.width,overlay.height);
  if(srcPoly){
    octx.strokeStyle="#00e08a"; octx.lineWidth=3; octx.beginPath();
    srcPoly.forEach((p,i)=> i?octx.lineTo(p[0],p[1]):octx.moveTo(p[0],p[1]));
    octx.closePath(); octx.stroke();
  }
  for(const t of tracks){
    const [x,y,w,h]=t.box;
    const over = limit!=null && t.speed!=null && t.speed>limit;
    const col = t.speed==null ? "#c8d0dc" : over ? "#ff4d57" : "#00e08a";
    octx.lineWidth=3; octx.strokeStyle=col; octx.strokeRect(x,y,w,h);
    const label = t.speed==null ? `#${t.id}` : `${Math.round(t.speed)} km/h`;
    octx.font="bold 22px -apple-system,sans-serif";
    const tw=octx.measureText(label).width+14;
    octx.fillStyle=col; octx.fillRect(x,y-30,tw,28);
    octx.fillStyle=over?"#fff":"#06231a"; octx.fillText(label,x+7,y-9);
  }
  requestAnimationFrame(drawLoop);
}

// ---------------------------------------------------------------------------
// Calibration: tap 4 road points, enter the real size of that patch
// ---------------------------------------------------------------------------
const calibBtn=document.getElementById("calibBtn"), calibMsg=document.getElementById("calibMsg");
calibBtn.onclick=()=>{ calibrating?finishCalib(true):startCalib(); };

function startCalib(){
  calibrating=true; calibPts=[]; tapLayer.style.display="block";
  tctx.clearRect(0,0,tapLayer.width,tapLayer.height);
  calibBtn.textContent="Cancel"; calibBtn.classList.remove("primary");
  showMsg("Tap <b>4 road points</b> in order: top-left, top-right, bottom-right, bottom-left of a stretch whose real size you know.");
}
function finishCalib(cancel){
  calibrating=false; tapLayer.style.display="none"; calibBtn.textContent="Calibrate";
  calibMsg.style.display="none";
  if(cancel){ if(srcPoly) {} return; }
}
tapLayer.addEventListener("pointerdown",e=>{
  if(!calibrating||calibPts.length>=4) return;
  const r=tapLayer.getBoundingClientRect();
  const x=(e.clientX-r.left)/r.width*tapLayer.width;
  const y=(e.clientY-r.top)/r.height*tapLayer.height;
  calibPts.push([x,y]); drawCalibPts();
  if(calibPts.length===4) askDimensions();
});
function drawCalibPts(){
  tctx.clearRect(0,0,tapLayer.width,tapLayer.height);
  tctx.strokeStyle="#00e08a"; tctx.lineWidth=3; tctx.beginPath();
  calibPts.forEach((p,i)=> i?tctx.lineTo(p[0],p[1]):tctx.moveTo(p[0],p[1]));
  if(calibPts.length===4) tctx.closePath(); tctx.stroke();
  const labels=["TL","TR","BR","BL"];
  calibPts.forEach((p,i)=>{ tctx.fillStyle="#00e08a"; tctx.beginPath();
    tctx.arc(p[0],p[1],8,0,7); tctx.fill();
    tctx.fillStyle="#06231a"; tctx.font="bold 14px sans-serif"; tctx.fillText(labels[i],p[0]-9,p[1]+5); });
}
function askDimensions(){
  showMsg("Patch outlined. Enter its real-world size…");
  const w=parseFloat(prompt("Width  (left ↔ right, metres):","3.5"));
  const l=parseFloat(prompt("Length (near ↔ far, metres):","12"));
  if(!(w>0)||!(l>0)){ showMsg("Invalid size — tap <b>Calibrate</b> to retry."); calibPts=[]; return; }
  buildHomography(calibPts,w,l); saveCalib({pts:calibPts,w,l});
  finishCalib(false);
  showMsg("✅ Calibrated. Speeds are now live."); setTimeout(()=>calibMsg.style.display="none",2500);
}
function buildHomography(pts,w,l){
  H=getPerspectiveTransform(pts,[[0,0],[w,0],[w,l],[0,l]]);
  srcPoly=pts; tracks=[];
}
function showMsg(html){ calibMsg.innerHTML=html; calibMsg.style.display="block"; }

// speed limit input
document.getElementById("limitInput").addEventListener("input",e=>{
  const v=parseFloat(e.target.value);
  limit=(v>0)?v:null;
  const pill=document.getElementById("limitPill");
  if(limit){ pill.style.display="flex"; document.getElementById("limitShown").textContent=limit; }
  else pill.style.display="none";
});
</script>
</body>
</html>
